services:
  postgres:
    image: postgres:16-alpine
    container_name: frontvalencia-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: frontvalencia
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: frontvalencia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U frontvalencia -d frontvalencia']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
