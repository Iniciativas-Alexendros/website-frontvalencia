version: 2
updates:
  - package-ecosystem: 'pnpm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - '📦 dependencies'
    groups:
      astro:
        patterns:
          - 'astro*'
          - '@astrojs/*'
      payload:
        patterns:
          - 'payload'
          - '@payloadcms/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      testing:
        patterns:
          - 'vitest'
          - '@playwright/*'
          - 'playwright'
    ignore:
      - dependency-name: 'sharp'
        versions: ['>=0.36.0']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
